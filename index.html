<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Italia First Person</title>

<link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet"/>

<style>
body { margin:0; overflow:hidden; }
#map { width:100vw; height:100vh; }
#info{
position:absolute;
top:10px;
left:10px;
background:black;
color:white;
padding:10px;
font-family:Arial;
z-index:999;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="info">
WASD = movimento<br>
Mouse = guarda intorno
</div>

<script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>

<script>
const map = new maplibregl.Map({
container: 'map',

style: 'https://demotiles.maplibre.org/style.json',

center: [9.1900,45.4642], // Milano
zoom: 17,
pitch: 75,
bearing: 0,
antialias: true
});

map.on('load', () => {

map.addLayer({
'id': '3d-buildings',
'source': 'openmaptiles',
'source-layer': 'building',
'type': 'fill-extrusion',
'minzoom': 15,
'paint': {
'fill-extrusion-color': '#aaa',

'fill-extrusion-height': [
'interpolate',
['linear'],
['zoom'],
15, 0,
16, ['get', 'render_height']
],

'fill-extrusion-base': [
'interpolate',
['linear'],
['zoom'],
15, 0,
16, ['get', 'render_min_height']
],

'fill-extrusion-opacity': 0.8
}
});

});

let keys = {};

window.addEventListener('keydown', e => {
keys[e.key.toLowerCase()] = true;
});

window.addEventListener('keyup', e => {
keys[e.key.toLowerCase()] = false;
});

function move() {

let center = map.getCenter();

let speed = 0.0005;

if(keys['w']) center.lat += speed;
if(keys['s']) center.lat -= speed;
if(keys['a']) center.lng -= speed;
if(keys['d']) center.lng += speed;

map.setCenter(center);

requestAnimationFrame(move);
}

move();

let dragging = false;

window.addEventListener('mousedown', () => dragging = true);
window.addEventListener('mouseup', () => dragging = false);

window.addEventListener('mousemove', e => {

if(!dragging) return;

let bearing = map.getBearing();
bearing += e.movementX * 0.1;

map.setBearing(bearing);

});
</script>

</body>
</html>
